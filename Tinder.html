<!DOCTYPE html>
	<head>
        <title> Tinder Fluxo | Pame </title>
		<link rel="stylesheet" href="estilo.css" />
	</head>
	<body>
		<!-- Vermelho para como Div geral -->
		<div class="vermelho">
			<!-- azul para todo a seção da esquerda do tinder-->
			<div class="azul">
				<!-- verde para o bloco superior esquerdo onde ficar o avatar -->
				<div class="verde">
					<!-- e: ícone do avatar junto com o titulo -->
					<div class="e">
						<div class="avatar">
						<img src="imagens/logo.png" />
						</div>
						<div class="titulo"> Fluxo Consultoria </div>
					</div>
				</div>
				<!-- Div do menu de match e mensagem-->
				<div class="roxo">
						<button class="linha" onclick="alert('Não faz nada esse botão');"> Matches</button>
						<button onclick="alert('Nem esse');"> Mensagens </button>
				</div>
					<div class="mensagem">
						<p> HMMMM analise </p>
					</div>
			</div>
			<!-- bloco cinza onde fica o quadrado do match-->
			<div class="cinza">
				<div class="card">
					<div class="A">
						<img class="usuario" src="imagens/mengo.jpeg"/>
						<div class="profile">
							<div class="nome">Diego <span>19</span> </div>
							<div class="texto">
								<p>Engenharia de controle e automação - 2° período </p>
							</div>
							<div class="laranja"> 
								<img src= "imagens/return.svg" />
								<img src= "imagens/x.svg" />
								<img src= "imagens/star.svg" />
								<img src= "imagens/heart.svg" />
								<img src= "imagens/lightning.svg" />
							</div>
						</div>
					</div>
				</div>
				<div class="legenda">
					
				</div>
			</div>
		</div>	
	</body>
</html>
